# FSM rephraser evaluation dataset (~40 rows).
# Each row = one input to the rephraser. Global deterministic + rubric
# checks live in promptfooconfig.yaml (defaultTest); here we only supply
# the vars and the row-specific `preserve` tokens (values that MUST appear
# verbatim in the output: job numbers, prices, dates, names, references).
#
# vars:
#   note     - the raw input text
#   tone     - Professional | Concise | Casual | Elaborate
#   type     - Default | Make Shorter | Make Longer
#   module   - source module/section (metadata, used in reports)
#   preserve - list of substrings that must survive unchanged
#
# Coverage: all four tones, all three types, spread across the FSM modules
# listed in the system prompt, with numeric/date/reference traps throughout.

# ---------------- Customer, Site & Asset Management ----------------
- description: "Customer note - Professional/Default"
  vars:
    module: "Customer Management – Notes"
    tone: "Professional"
    type: "Default"
    note: "customer called re overdue balance of £2,340.50 on account ACC-8891, agreed to pay half by 18/07/2026 and the rest by month end"
    preserve: ["£2,340.50", "ACC-8891", "18/07/2026"]

- description: "Site description - Elaborate/Default"
  vars:
    module: "Site Management – Description"
    tone: "Elaborate"
    type: "Default"
    note: "3-storey office block at 42 Kings Road, plant room in basement, main isolator by rear entrance"
    preserve: ["42 Kings Road", "3-storey"]

- description: "Payment terms - Professional/Default"
  vars:
    module: "Customer Management – Payment Terms"
    tone: "Professional"
    type: "Default"
    note: "payment to be made within 30 days of invoice date, 2.5% late fee applies after that"
    preserve: ["30", "2.5%"]

- description: "Warning notice - Concise/Default"
