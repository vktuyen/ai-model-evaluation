- description: "Customer warning - Professional/Make Shorter"
  vars:
    module: "Customer Management – Warning Notice"
    tone: "Professional"
    type: "Make Shorter"
    note: "This customer has a history of delayed payments and on two previous occasions has disputed invoices after work was completed, so please ensure that a signed job sheet and photographic evidence are obtained on every visit before leaving site."
    preserve: ["two"]

- description: "Asset description - Elaborate/Make Longer"
